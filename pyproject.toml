[tool.black]
line-length = 88
target-version = ["py310"]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
check_untyped_defs = true
exclude = ["dbt/target", "data", "docs"]

[tool.pytest.ini_options]
markers = [
    "smoke: fast end-to-end validation of the critical pipeline path",
]
